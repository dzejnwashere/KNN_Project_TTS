name: "HifiGan"

train_dataset: /mnt/matylda6/xokruc00/knn/second_nemo_tts/NeMo/manifest_train.json
validation_datasets: /mnt/matylda6/xokruc00/knn/second_nemo_tts/NeMo/manifest_val.json
sup_data_path: /mnt/matylda6/xokruc00/knn/second_nemo_tts/NeMo/sup_data

sample_rate: 22050
n_mel_channels: 80
n_window_size: 1024
n_window_stride: 256
n_fft: 1024
lowfreq: 0
highfreq: 8000
window: hann
train_n_segments: 8192
train_max_duration: null
train_min_duration: 0.75
val_n_segments: 66048
val_max_duration: null
val_min_duration: 3

init_from_nemo_model: /mnt/matylda6/xokruc00/knn/tts_hifigan.nemo

model:
  preprocessor:
    _target_: nemo.collections.asr.parts.preprocessing.features.FilterbankFeatures
    nfilt: ${n_mel_channels}
    lowfreq: ${lowfreq}
    highfreq: ${highfreq}
    n_fft: ${n_fft}
    n_window_size: ${n_window_size}
    n_window_stride: ${n_window_stride}
    pad_to: 0
    pad_value: -11.52
    sample_rate: ${sample_rate}
    window: ${window}
    normalize: null
    preemph: null
    dither: 0.0
    frame_splicing: 1
    log: true
    log_zero_guard_type: clamp
    log_zero_guard_value: 1e-05
    mag_power: 1.0
    use_grads: false
    exact_pad: true
  generator:
    _target_: nemo.collections.tts.modules.hifigan_modules.Generator
    resblock: 1
    upsample_rates: [ 8, 8, 2, 2 ]
    upsample_kernel_sizes: [ 16, 16, 4, 4 ]
    upsample_initial_channel: 512
    resblock_kernel_sizes: [ 3, 7, 11 ]
    resblock_dilation_sizes: [ [ 1, 3, 5 ], [ 1, 3, 5 ], [ 1, 3, 5 ] ]

  train_ds:
    dataset:
      _target_: nemo.collections.tts.data.dataset.VocoderDataset
      manifest_filepath: ${train_dataset}
      sample_rate: ${sample_rate}
      n_segments: 8192
      max_duration: null
      min_duration: 0.75
      hop_length: ${n_window_stride}
      load_precomputed_mel: false
    dataloader_params:
      drop_last: false
      shuffle: true
      batch_size: 32
      num_workers: 4

  validation_ds:
    dataset:
      _target_: nemo.collections.tts.data.dataset.VocoderDataset
      manifest_filepath: ${validation_datasets}
      sample_rate: ${sample_rate}
      n_segments: 65536
      max_duration: null
      min_duration: 3
      hop_length: ${n_window_stride}
      load_precomputed_mel: false
    dataloader_params:
      drop_last: false
      shuffle: false
      batch_size: 16
      num_workers: 4
  optim:
    _target_: torch.optim.AdamW
    lr: 0.0001
    betas: [0.8, 0.99]
    sched:
      name: CosineAnnealing
      min_lr: 1e-5
      warmup_ratio: 0.02

  max_steps: 100000
  l1_loss_factor: 45
  denoise_strength: 0.0025

trainer:
  num_nodes: 1
  devices: 1
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  precision: 32
  max_steps: ${model.max_steps}
  accumulate_grad_batches: 1
  enable_checkpointing: False
  logger: false
  log_every_n_steps: 100
  check_val_every_n_epoch: 10
  benchmark: false

exp_manager:
  exp_dir: /mnt/matylda6/xokruc00/knn/first_nemo_tts/NeMo/nemo_experiments
  name: HifiGan_finetune
  create_tensorboard_logger: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: val_loss
    mode: min
  resume_if_exists: false
  resume_ignore_no_checkpoint: false